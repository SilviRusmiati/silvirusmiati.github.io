<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey Kepuasan Pelanggan</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="profile-container">
        <div class="profile-card">

            <div class="card-header">
                <div class="profile-text">
                    <h1 class="profile-name">Survey Kepuasan</h1>
                    <p class="profile-subtitle">Form Penilaian Pelanggan</p>
                </div>
            </div>

            <div class="section">
                <h2 class="section-title">
                    <i class="fas fa-user"></i> Data Pelanggan
                </h2>

                <form action="" method="post">

                    <div class="form-group">
                        <label>Nama Lengkap</label>
                        <input type="text" name="nama" required>
                    </div>

                    <div class="form-group">
                        <label>Alamat</label>
                        <input type="text" name="alamat" required>
                    </div>

                    <div class="form-group">
                        <label>No. Telepon</label>
                        <input type="text" name="telepon" required>
                    </div>

                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="email">
                    </div>

                    <div class="section">
                        <h2 class="section-title">
                            <i class="fas fa-users"></i> Kategori Pelanggan
                        </h2>

                        <div class="form-group">
                            <label>Pilih Kategori</label>
                            <select name="kategori" required>
                                <option value="">-- Pilih Kategori --</option>
                                <option value="pelajar">Pelajar</option>
                                <option value="mahasiswa">Mahasiswa</option>
                                <option value="umum">Umum</option>
                                <option value="pegawai">Pegawai</option>
                            </select>
                        </div>
                    </div>

                    <div class="section">
                        <h2 class="section-title">
                            <i class="fas fa-box-open"></i> Produk Disukai
                        </h2>

                        <div class="checkbox-group">
                            <label><input type="checkbox" name="produk[]" value="Laptop"> Laptop</label>
                            <label><input type="checkbox" name="produk[]" value="Smartphone"> Smartphone</label>
                            <label><input type="checkbox" name="produk[]" value="Headset"> Headset</label>
                            <label><input type="checkbox" name="produk[]" value="Keyboard"> Keyboard</label>
                        </div>
                    </div>

                    <div class="section">
                        <h2 class="section-title">
                            <i class="fas fa-star"></i> Tingkat Kepuasan
                        </h2>

                        <div class="radio-group">
                            <label><input type="radio" name="kepuasan" value="Sangat Puas" required> Sangat Puas</label>
                            <label><input type="radio" name="kepuasan" value="Puas"> Puas</label>
                            <label><input type="radio" name="kepuasan" value="Cukup"> Cukup</label>
                            <label><input type="radio" name="kepuasan" value="Kurang Puas"> Kurang Puas</label>
                        </div>
                    </div>

                    <div class="section">
                        <h2 class="section-title">
                            <i class="fas fa-comment-dots"></i> Komentar
                        </h2>

                        <div class="form-group">
                            <label>Tulis Komentar</label>
                            <textarea name="komentar" rows="5"></textarea>
                        </div>
                    </div>

                    <div class="button-group">
                        <input type="submit" value="Kirim Survey" class="btn-submit">
                        <input type="reset" value="Reset Form" class="btn-reset">
                    </div>

                </form>
            </div>

            <div class="card-footer">
                <p>Pemrograman Web : Form HTML</p>
            </div>

        </div>
    </div>
</body>
</html>
